inear-gradient(105deg,#8e86f0,#6a76ee); display:flex; align-items:center; justify-content:center; margin:0 auto 30px; box-shadow:0 14px 30px rgba(122,120,237,0.32);\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:42px; font-weight:800; letter-spacing:-0.02em; margin:0 0 16px;\">Your application is in.<\u002Fh2>\n        <p style=\"font-size:19px; line-height:1.55; color:#5b6478; font-weight:500; margin:0;\">We read every one personally. If you're one of the 15 families, you'll hear from us by email within a few days — with your login and a short welcome from the team.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n\n    <!-- lavender block: nav + hero + features -->\n    <div style=\"background:radial-gradient(120% 70% at 88% 8%, #e4dffb 0%, rgba(228,223,251,0) 55%), radial-gradient(90% 60% at 6% 34%, #edebfe 0%, rgba(237,235,254,0) 50%), linear-gradient(180deg,#fbfbff 0%, #efedfc 38%, #e7e3fb 100%);\">\n\n      <!-- nav -->\n      <div style=\"position:sticky; top:0; z-index:200; background:rgba(251,251,255,0.72); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(10,36,99,0.05);\">\n        <div style=\"max-width:1120px; margin:0 auto; padding:15px 24px; display:flex; align-items:center; justify-content:space-between;\">\n          <img src=\"56e6a1ab-99c6-44c2-b807-fe1db62ec097\" alt=\"Qoollege\" style=\"height:30px; width:auto; display:block;\">\n          <div style=\"display:flex; align-items:center; gap:18px;\">\n            <span style=\"font-size:14px; font-weight:700; color:#7c84a3;\">Family Beta<\u002Fspan>\n            <a href=\"#apply\" style=\"display:inline-flex; align-items:center; padding:9px 22px; border-radius:999px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:15px; font-weight:700; text-decoration:none;\">Apply<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- hero -->\n      <section style=\"max-width:900px; margin:0 auto; padding:84px 24px 0; text-align:center;\">\n        <sc-if value=\"{{ showScarcity }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex; align-items:center; gap:9px; padding:8px 17px; border-radius:999px; background:rgba(255,255,255,0.75); box-shadow:0 4px 14px rgba(10,36,99,0.06); font-size:13px; font-weight:700; color:#0a2463; margin-bottom:28px;\">\n          <span style=\"width:8px; height:8px; border-radius:50%; background:linear-gradient(105deg,#22b6e8,#1488d6);\"><\u002Fspan>\n          Qoollege Beta · 15 family spots\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <h1 style=\"font-family:'Syne',sans-serif; font-size:clamp(44px,6.4vw,78px); line-height:1.04; font-weight:800; letter-spacing:-0.025em; margin:0 auto 24px; max-width:14ch;\">Full access to Qoollege, <span style=\"background:linear-gradient(105deg,#22b6e8,#1488d6); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;\">free<\u002Fspan>.<\u002Fh1>\n        <p style=\"font-size:20px; line-height:1.5; color:#5b6478; font-weight:500; max-width:46ch; margin:0 auto 34px;\">We're opening 15 spots to use the complete platform free for 30 days. No payment, no catch — all we ask in return is your time and your honest feedback.<\u002Fp>\n        <div style=\"display:flex; gap:18px; align-items:center; justify-content:center; flex-wrap:wrap;\">\n          <a href=\"#apply\" style=\"display:inline-flex; align-items:center; padding:15px 34px; border-radius:999px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:17px; font-weight:700; text-decoration:none; box-shadow:0 10px 26px rgba(122,120,237,0.32);\">Apply for a spot<\u002Fa>\n          <a href=\"#ask\" style=\"display:inline-flex; align-items:center; gap:6px; color:#6a76ee; font-size:17px; font-weight:700; text-decoration:none;\">See what we ask\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><polyline points=\"19 12 12 19 5 12\"><\u002Fpolyline><\u002Fsvg>\n          <\u002Fa>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; font-weight:700; color:#9aa0bd; margin:18px 0 0;\">No payment information required, ever.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- hero image composition -->\n      <div style=\"position:relative; width:100%; overflow:hidden; margin-top:56px;\">\n        <div style=\"position:relative; max-width:1240px; margin:0 auto; min-height:clamp(360px,44vw,520px); display:flex; justify-content:center; align-items:flex-start; padding-top:24px;\">\n          <div style=\"position:absolute; left:2%; top:70px; width:clamp(180px,18vw,260px); z-index:1;\">\n            \n          <\u002Fdiv>\n          <div style=\"position:absolute; right:2%; top:42px; width:clamp(200px,21vw,300px); z-index:1;\">\n            \n          <\u002Fdiv>\n          <div style=\"position:relative; z-index:3; width:min(620px,86%);\">\n            <image-slot id=\"qoollege-hero-u\" style=\"width:100%; height:clamp(300px,38vw,440px); box-shadow:0 30px 70px rgba(10,36,99,0.18);\" shape=\"rounded\" radius=\"26\" placeholder=\"Drop the hero photo — a student &amp; parent at the laptop together\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- what you get -->\n      <section style=\"max-width:1040px; margin:0 auto; padding:112px 24px 130px;\">\n        <p style=\"font-size:14px; font-weight:700; letter-spacing:0.04em; color:#12a99c; margin:0 0 14px; text-align:center;\">What you get<\u002Fp>\n        <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(32px,4.4vw,52px); font-weight:800; letter-spacing:-0.02em; line-height:1.08; margin:0 auto 68px; text-align:center; max-width:16ch;\">The complete platform, same one families pay for.<\u002Fh2>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:56px 72px;\">\n          <div>\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#fff; box-shadow:0 8px 20px rgba(10,36,99,0.07); display:flex; align-items:center; justify-content:center; color:#2a6fdb; margin-bottom:22px;\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><polygon points=\"15.6 8.4 10.6 10.6 8.4 15.6 13.4 13.4\"><\u002Fpolygon><\u002Fsvg>\n            <\u002Fdiv>\n            <h3 style=\"font-size:23px; font-weight:800; letter-spacing:-0.01em; margin:0 0 10px;\">Full college matching<\u002Fh3>\n            <p style=\"font-size:17px; line-height:1.55; color:#5b6478; font-weight:500; margin:0;\">Search and match across 6,000+ US colleges based on your student's actual profile — not a generic ranking list.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#fff; box-shadow:0 8px 20px rgba(10,36,99,0.07); display:flex; align-items:center; justify-content:center; color:#0f9d7e; margin-bottom:22px;\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <h3 style=\"font-size:23px; font-weight:800; letter-spacing:-0.01em; margin:0 0 10px;\">Essay coaching<\u002Fh3>\n            <p style=\"font-size:17px; line-height:1.55; color:#5b6478; font-weight:500; margin:0;\">AI-powered guidance that strengthens the student's voice — it sharpens what they wrote, it doesn't replace it.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#fff; box-shadow:0 8px 20px rgba(10,36,99,0.07); display:flex; align-items:center; justify-content:center; color:#6c7bf5; margin-bottom:22px;\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"6\"><\u002Fcircle><path d=\"M8.5 13.5 7 22l5-3 5 3-1.5-8.5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <h3 style=\"font-size:23px; font-weight:800; letter-spacing:-0.01em; margin:0 0 10px;\">Scholarship finder<\u002Fh3>\n            <p style=\"font-size:17px; line-height:1.55; color:#5b6478; font-weight:500; margin:0;\">Surfaces funding opportunities most families never find on their own — matched to your student.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#fff; box-shadow:0 8px 20px rgba(10,36,99,0.07); display:flex; align-items:center; justify-content:center; margin-bottom:22px;\">\n              <svg width=\"30\" height=\"30\" viewBox=\"0 0 40 40\" fill=\"none\"><circle cx=\"17\" cy=\"17\" r=\"13.5\" stroke=\"#0a2463\" stroke-width=\"3.2\"><\u002Fcircle><circle cx=\"12.5\" cy=\"16\" r=\"2.7\" fill=\"#3b82f6\"><\u002Fcircle><circle cx=\"21.5\" cy=\"16\" r=\"2.7\" fill=\"#2de9d3\"><\u002Fcircle><path d=\"M11.5 21.5 Q17 26 22.5 21.5\" stroke=\"#2de9d3\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath><line x1=\"27\" y1=\"27\" x2=\"35.5\" y2=\"35.5\" stroke=\"#0a2463\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n            <\u002Fdiv>\n            <h3 style=\"font-size:23px; font-weight:800; letter-spacing:-0.01em; margin:0 0 10px;\">Ollie, your AI advisor<\u002Fh3>\n            <p style=\"font-size:17px; line-height:1.55; color:#5b6478; font-weight:500; margin:0;\">A 24/7 advisor that answers the real questions about the admissions process — the ones you'd usually have to call someone for.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- what we ask (cream) -->\n    <section id=\"ask\" style=\"background:linear-gradient(180deg,#f8f6f1 0%, #f3efe8 100%);\">\n      <div style=\"max-width:880px; margin:0 auto; padding:120px 24px;\">\n        <p style=\"font-size:14px; font-weight:700; letter-spacing:0.04em; color:#12a99c; margin:0 0 14px; text-align:center;\">A few things we'd love from you<\u002Fp>\n        <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(32px,4.4vw,52px); font-weight:800; letter-spacing:-0.02em; line-height:1.08; margin:0 auto 16px; text-align:center; max-width:18ch;\">What partnering with us looks like.<\u002Fh2>\n        <p style=\"font-size:19px; line-height:1.55; color:#6b6f7e; font-weight:500; text-align:center; max-width:50ch; margin:0 auto 56px;\">Four commitments. A few hours across 30 days. No surprises later.<\u002Fp>\n        <div>\n          <sc-for list=\"{{ askItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid; grid-template-columns:72px 1fr; gap:28px; padding:36px 0; border-top:1px solid rgba(10,36,99,0.10);\">\n              <div style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:40px; font-weight:700; color:#c8c4d8; letter-spacing:-0.02em; line-height:1;\">{{ item.n }}<\u002Fdiv>\n              <div>\n                <h3 style=\"font-size:23px; font-weight:800; letter-spacing:-0.01em; margin:0 0 8px;\">{{ item.title }}<\u002Fh3>\n                <p style=\"font-size:17px; line-height:1.55; color:#6b6f7e; font-weight:500; margin:0;\">{{ item.body }}<\u002Fp>\n                <sc-if value=\"{{ item.hasToggle }}\">\n                  <div style=\"margin-top:20px;\">\n                    <div style=\"display:inline-flex; background:#fff; border-radius:12px; padding:4px; box-shadow:inset 0 0 0 1px rgba(10,36,99,0.07);\">\n                      <button onclick=\"{{ setCall }}\" style=\"{{ callBtn }}\">3 video check-ins<\u002Fbutton>\n                      <button onclick=\"{{ setDiary }}\" style=\"{{ diaryBtn }}\">3 diary recordings<\u002Fbutton>\n                    <\u002Fdiv>\n                    <p style=\"font-size:15px; line-height:1.5; color:#8a8e9c; font-weight:500; margin:14px 0 0; max-width:56ch;\">{{ checkBlurb }}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- apply — typeform-style -->\n    <section id=\"apply\" style=\"background:radial-gradient(120% 70% at 12% 8%, #e4dffb 0%, rgba(228,223,251,0) 55%), radial-gradient(90% 60% at 94% 40%, #edebfe 0%, rgba(237,235,254,0) 50%), linear-gradient(180deg,#efedfc 0%, #e7e3fb 100%);\">\n      <div style=\"max-width:1040px; margin:0 auto; padding:120px 24px;\">\n        <div style=\"text-align:center; margin-bottom:44px;\">\n          <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(32px,4.4vw,52px); font-weight:800; letter-spacing:-0.02em; margin:0 0 14px;\">Apply for a spot<\u002Fh2>\n          <p style=\"font-size:18px; line-height:1.5; color:#5b6478; font-weight:500; margin:0;\">Six quick questions. Two minutes. Press <strong style=\"color:#0a2463; font-weight:800;\">Enter ↵<\u002Fstrong> to move on.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"max-width:720px; margin:0 auto; background:#fff; border:1px solid rgba(10,36,99,0.06); border-radius:24px; box-shadow:0 30px 70px rgba(10,36,99,0.12); position:relative; overflow:hidden;\">\n          <!-- progress -->\n          <div style=\"position:absolute; top:0; left:0; right:0; height:4px; background:#f0f0f3;\">\n            <div style=\"{{ barStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:clamp(40px,5vw,64px); min-height:440px; display:flex; flex-direction:column; justify-content:center;\">\n\n            <!-- Q1 student name -->\n            <sc-if value=\"{{ is0 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"display:flex; align-items:center; gap:8px; color:#6a76ee; font-size:15px; font-weight:800; margin-bottom:16px;\">1<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"font-size:clamp(25px,3.3vw,33px); font-weight:800; letter-spacing:-0.015em; margin:0 0 28px;\">First, what's the student's name?<\u002Fh3>\n                <input data-active-input=\"\" type=\"text\" value=\"{{ answers.studentName }}\" oninput=\"{{ onStudentName }}\" placeholder=\"Type your answer here…\" style=\"width:100%; font-family:inherit; font-size:26px; font-weight:600; color:#0a2463; border:none; border-bottom:2px solid #d9d9e0; background:transparent; padding:8px 2px; outline:none;\" style-focus=\"border-bottom:2px solid #6a76ee;\">\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n                <div style=\"display:flex; align-items:center; gap:16px; margin-top:34px;\">\n                  <button onclick=\"{{ next }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border:none; border-radius:12px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 8px 20px rgba(122,120,237,0.28);\">OK<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n                  <span style=\"font-size:13px; color:#9aa0bd; font-weight:700;\">press <strong style=\"color:#6b6f7e;\">Enter ↵<\u002Fstrong><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Q2 parent name -->\n            <sc-if value=\"{{ is1 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"display:flex; align-items:center; gap:8px; color:#6a76ee; font-size:15px; font-weight:800; margin-bottom:16px;\">2<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"font-size:clamp(25px,3.3vw,33px); font-weight:800; letter-spacing:-0.015em; margin:0 0 28px;\">And the parent or guardian's name?<\u002Fh3>\n                <input data-active-input=\"\" type=\"text\" value=\"{{ answers.parentName }}\" oninput=\"{{ onParentName }}\" placeholder=\"Type your answer here…\" style=\"width:100%; font-family:inherit; font-size:26px; font-weight:600; color:#0a2463; border:none; border-bottom:2px solid #d9d9e0; background:transparent; padding:8px 2px; outline:none;\" style-focus=\"border-bottom:2px solid #6a76ee;\">\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n                <div style=\"display:flex; align-items:center; gap:16px; margin-top:34px;\">\n                  <button onclick=\"{{ next }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border:none; border-radius:12px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 8px 20px rgba(122,120,237,0.28);\">OK<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n                  <span style=\"font-size:13px; color:#9aa0bd; font-weight:700;\">press <strong style=\"color:#6b6f7e;\">Enter ↵<\u002Fstrong><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Q3 email -->\n            <sc-if value=\"{{ is2 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"display:flex; align-items:center; gap:8px; color:#6a76ee; font-size:15px; font-weight:800; margin-bottom:16px;\">3<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"font-size:clamp(25px,3.3vw,33px); font-weight:800; letter-spacing:-0.015em; margin:0 0 28px;\">What's the best email for the parent?<\u002Fh3>\n                <input data-active-input=\"\" type=\"email\" value=\"{{ answers.email }}\" oninput=\"{{ onEmail }}\" placeholder=\"name@email.com\" style=\"width:100%; font-family:inherit; font-size:26px; font-weight:600; color:#0a2463; border:none; border-bottom:2px solid #d9d9e0; background:transparent; padding:8px 2px; outline:none;\" style-focus=\"border-bottom:2px solid #6a76ee;\">\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n                <div style=\"display:flex; align-items:center; gap:16px; margin-top:34px;\">\n                  <button onclick=\"{{ next }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border:none; border-radius:12px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 8px 20px rgba(122,120,237,0.28);\">OK<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n                  <span style=\"font-size:13px; color:#9aa0bd; font-weight:700;\">press <strong style=\"color:#6b6f7e;\">Enter ↵<\u002Fstrong><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Q4 location -->\n            <sc-if value=\"{{ is3 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"display:flex; align-items:center; gap:8px; color:#6a76ee; font-size:15px; font-weight:800; margin-bottom:16px;\">4<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"font-size:clamp(25px,3.3vw,33px); font-weight:800; letter-spacing:-0.015em; margin:0 0 20px;\">Where are you based?<\u002Fh3>\n                <input data-active-input=\"\" type=\"text\" value=\"{{ stateFilter }}\" oninput=\"{{ onStateFilter }}\" placeholder=\"Start typing your state, or “outside”…\" style=\"width:100%; font-family:inherit; font-size:20px; font-weight:600; color:#0a2463; border:none; border-bottom:2px solid #d9d9e0; background:transparent; padding:8px 2px; outline:none; margin-bottom:18px;\" style-focus=\"border-bottom:2px solid #6a76ee;\">\n                <div style=\"max-height:230px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-right:4px;\">\n                  <sc-for list=\"{{ stateOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ opt.onPick }}\" style=\"{{ opt.cardStyle }}\"><span style=\"{{ opt.badgeStyle }}\">{{ opt.letter }}<\u002Fspan>{{ opt.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Q5 grade -->\n            <sc-if value=\"{{ is4 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"display:flex; align-items:center; gap:8px; color:#6a76ee; font-size:15px; font-weight:800; margin-bottom:16px;\">5<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"font-size:clamp(25px,3.3vw,33px); font-weight:800; letter-spacing:-0.015em; margin:0 0 24px;\">What grade is the student in?<\u002Fh3>\n                <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                  <sc-for list=\"{{ gradeOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n                    <button onclick=\"{{ opt.onPick }}\" style=\"{{ opt.cardStyle }}\"><span style=\"{{ opt.badgeStyle }}\">{{ opt.letter }}<\u002Fspan>{{ opt.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Q6 challenge -->\n            <sc-if value=\"{{ is5 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"display:flex; align-items:center; gap:8px; color:#6a76ee; font-size:15px; font-weight:800; margin-bottom:16px;\">6<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n                <h3 style=\"font-size:clamp(23px,3.1vw,31px); font-weight:800; letter-spacing:-0.015em; margin:0 0 26px;\">In one sentence — what's your biggest challenge with US college prep right now?<\u002Fh3>\n                <textarea data-active-input=\"\" rows=\"2\" value=\"{{ answers.challenge }}\" oninput=\"{{ onChallenge }}\" placeholder=\"Type your answer here…\" style=\"width:100%; font-family:inherit; font-size:22px; font-weight:600; line-height:1.4; color:#0a2463; border:none; border-bottom:2px solid #d9d9e0; background:transparent; padding:8px 2px; outline:none; resize:none;\" style-focus=\"border-bottom:2px solid #6a76ee;\"><\u002Ftextarea>\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n                <div style=\"display:flex; align-items:center; gap:16px; margin-top:30px;\">\n                  <button onclick=\"{{ next }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border:none; border-radius:12px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 8px 20px rgba(122,120,237,0.28);\">OK<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n                  <span style=\"font-size:13px; color:#9aa0bd; font-weight:700;\">Shift + Enter for a new line<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- consent + submit -->\n            <sc-if value=\"{{ is6 }}\">\n              <div style=\"animation:qstep .35s ease both;\">\n                <div style=\"font-size:15px; font-weight:800; color:#12a99c; margin-bottom:16px;\">Almost there<\u002Fdiv>\n                <h3 style=\"font-size:clamp(23px,3.1vw,31px); font-weight:800; letter-spacing:-0.015em; margin:0 0 24px;\">One last thing before you apply.<\u002Fh3>\n                <button onclick=\"{{ toggleConsent }}\" style=\"{{ consentStyle }}\">\n                  <span style=\"{{ consentBoxStyle }}\"><sc-if value=\"{{ answers.consent }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fsc-if><\u002Fspan>\n                  <span style=\"font-size:16px; line-height:1.55; color:#46506e; font-weight:600; text-align:left;\">I understand this is a 30-day beta and I agree to complete the check-ins (or diary recordings) and the exit survey as part of my participation.<\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ error }}\"><p style=\"color:#e0464f; font-size:14px; font-weight:700; margin:14px 0 0;\">{{ error }}<\u002Fp><\u002Fsc-if>\n                <div style=\"margin-top:30px;\">\n                  <button onclick=\"{{ next }}\" style=\"display:inline-flex; align-items:center; gap:9px; padding:15px 32px; border:none; border-radius:12px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:17px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 10px 24px rgba(122,120,237,0.30);\">Apply for a beta spot<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n\n          <!-- step nav -->\n          <div style=\"position:absolute; right:18px; bottom:18px; display:flex; gap:8px;\">\n            <button onclick=\"{{ back }}\" style=\"{{ backStyle }}\" aria-label=\"Previous\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"18 15 12 9 6 15\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n            <button onclick=\"{{ next }}\" style=\"{{ fwdStyle }}\" aria-label=\"Next\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- closing CTA -->\n    <section style=\"background:linear-gradient(180deg,#e7e3fb 0%, #ddd7f7 100%);\">\n      <div style=\"max-width:760px; margin:0 auto; padding:120px 24px; text-align:center;\">\n        <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(34px,5vw,60px); font-weight:800; letter-spacing:-0.02em; margin:0 0 18px;\">Be <span style=\"background:linear-gradient(105deg,#22b6e8,#1488d6); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;\">ONE<\u002Fspan> of 15 families.<\u002Fh2>\n        <p style=\"font-size:19px; line-height:1.55; color:#5b6478; font-weight:500; max-width:46ch; margin:0 auto 32px;\">Full platform access, free for 30 days. All we ask is honest feedback.<\u002Fp>\n        <a href=\"#apply\" style=\"display:inline-flex; align-items:center; padding:15px 34px; border-radius:999px; background:linear-gradient(105deg,#8e86f0,#6a76ee); color:#fff; font-size:17px; font-weight:700; text-decoration:none; box-shadow:0 10px 26px rgba(122,120,237,0.32);\">Apply for a spot<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- footer -->\n    <footer style=\"background:#ddd7f7;\">\n      <div style=\"max-width:1120px; margin:0 auto; padding:36px 24px 44px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;\">\n        <img src=\"56e6a1ab-99c6-44c2-b807-fe1db62ec097\" alt=\"Qoollege\" style=\"height:26px; width:auto; display:block;\">\n        <p style=\"font-size:14px; color:#8a8ea8; font-weight:600; margin:0;\">15-family beta · No payment information required.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:900},&quot;showScarcity&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { step: 0, checkMode: 'call', submitted: false, error: '', stateFilter: '',\n    answers: { studentName: '', parentName: '', email: '', state: '', grade: '', challenge: '', consent: false } };\n\n  total = 7;\n  usStates = ['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming','Washington, D.C.','Outside the United States'];\n  grades = ['9th grade','10th grade','11th grade','12th grade','Other / not sure yet'];\n\n  componentDidMount() {\n    this._key = (e) => {\n      if (this.state.submitted) return;\n      if (e.key !== 'Enter' || e.shiftKey) return;\n      const tag = ((e.target && e.target.tagName) || '').toLowerCase();\n      if (tag === 'a') return;\n      e.preventDefault();\n      this.next();\n    };\n    if (typeof window !== 'undefined') window.addEventListener('keydown', this._key);\n    this._focus();\n  }\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState && prevState.step !== this.state.step) this._focus();\n  }\n  componentWillUnmount() {\n    if (typeof window !== 'undefined' && this._key) window.removeEventListener('keydown', this._key);\n  }\n  _focus() {\n    if (typeof document === 'undefined') return;\n    setTimeout(() => { const el = document.querySelector('[data-active-input]'); if (el) el.focus(); }, 50);\n  }\n\n  set(key, val) { this.setState(s => ({ answers: { ...s.answers, [key]: val }, error: '' })); }\n  filteredStates() {\n    const f = (this.state.stateFilter || '').toLowerCase().trim();\n    if (!f) return this.usStates;\n    return this.usStates.filter(s => s.toLowerCase().includes(f));\n  }\n  validate(step) {\n    const a = this.state.answers;\n    if (step === 0) return a.studentName.trim() ? '' : \"Please enter the student's name.\";\n    if (step === 1) return a.parentName.trim() ? '' : \"Please enter the parent or guardian's name.\";\n    if (step === 2) return /^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(a.email.trim()) ? '' : 'Please enter a valid email address.';\n    if (step === 3) return a.state ? '' : 'Choose where you are based to continue.';\n    if (step === 4) return a.grade ? '' : 'Pick the student\\u2019s grade.';\n    if (step === 5) return a.challenge.trim() ? '' : 'A sentence helps us understand where you are.';\n    if (step === 6) return a.consent ? '' : 'Please agree to continue.';\n    return '';\n  }\n  _advance() {\n    const step = this.state.step;\n    if (step >= this.total - 1) { this.submit(); return; }\n    this.setState({ step: step + 1, error: '' });\n  }\n  next() {\n    const step = this.state.step;\n    if (step === 3 && !this.state.answers.state) {\n      const f = this.filteredStates();\n      if (f.length && this.state.stateFilter.trim()) { this.pickState(f[0]); return; }\n      this.setState({ error: 'Choose where you are based to continue.' });\n      return;\n    }\n    const err = this.validate(step);\n    if (err) { this.setState({ error: err }); return; }\n    this._advance();\n  }\n  back() { if (this.state.step > 0) this.setState(s => ({ step: s.step - 1, error: '' })); }\n  pickState(s) { this.setState(st => ({ answers: { ...st.answers, state: s }, error: '' }), () => this._advance()); }\n  pickGrade(g) { this.setState(st => ({ answers: { ...st.answers, grade: g }, error: '' }), () => this._advance()); }\n  submit() { this.setState({ submitted: true }); if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' }); }\n\n  renderVals() {\n    const showScarcity = this.props.showScarcity ?? true;\n    const isCall = this.state.checkMode === 'call';\n    const { step, answers, error, stateFilter } = this.state;\n\n    const togglePill = { padding: '9px 16px', border: 'none', borderRadius: '9px', fontSize: '14px', fontWeight: 700, cursor: 'pointer', transition: 'all .2s ease', fontFamily: 'inherit' };\n    const tActive = { ...togglePill, background: '#f1f0fe', color: '#6a76ee', boxShadow: 'inset 0 0 0 1px rgba(106,118,238,0.30)' };\n    const tIdle = { ...togglePill, background: 'transparent', color: '#8a8e9c' };\n\n    const checkBlurb = isCall\n      ? \"Three relaxed 20-minute conversations with our team, after day 7. No preparation needed — we just want to hear what's working and what isn't.\"\n      : \"Prefer to skip the calls? Leave three short voice or video diary recordings instead — after day 9, day 18, and near the end of your 30 days.\";\n\n    const askItems = [\n      { n: '01', title: 'Complete a short intake survey', body: \"At the start of the beta, you'll take a survey about what you expect and where you are in the journey. It takes only five minutes.\" },\n      { n: '02', title: 'Use the platform regularly', body: 'At least 3 times a week during your 30 days. The more you explore, the more useful your feedback is to us.' },\n      { n: '03', title: 'Three 20-minute check-ins (or diary recordings)', body: 'Pick whichever fits your family. Either way it adds up to about an hour, spread across the month.', hasToggle: true },\n      { n: '04', title: 'A short exit survey at day 30', body: 'Tell us what you found valuable, what was missing, and whether you would use it again.' }\n    ];\n\n    const cardBase = (selected) => ({ display: 'flex', alignItems: 'center', gap: '14px', width: '100%', textAlign: 'left', padding: '13px 16px', fontFamily: 'inherit', fontSize: '17px', fontWeight: 700, cursor: 'pointer', borderRadius: '11px', transition: 'all .15s ease', border: selected ? '1.5px solid #6a76ee' : '1.5px solid #dcdce3', background: selected ? '#f1f0fe' : '#fff', color: '#0a2463' });\n    const badgeBase = (selected) => ({ flexShrink: 0, width: '26px', height: '26px', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: '6px', fontSize: '13px', fontWeight: 800, border: selected ? 'none' : '1.5px solid #c7c7d2', background: selected ? '#6a76ee' : 'transparent', color: selected ? '#fff' : '#8a8a97' });\n    const letters = ['A','B','C','D','E','F','G','H','I','J'];\n\n    const gradeOptions = this.grades.map((g, i) => ({\n      label: g, letter: letters[i], onPick: () => this.pickGrade(g),\n      cardStyle: cardBase(answers.grade === g), badgeStyle: badgeBase(answers.grade === g)\n    }));\n\n    const stateOptions = this.filteredStates().map((s, i) => ({\n      label: s, letter: letters[i] || '·', onPick: () => this.pickState(s),\n      cardStyle: cardBase(answers.state === s), badgeStyle: badgeBase(answers.state === s)\n    }));\n\n    const navBtn = (enabled) => ({ width: '40px', height: '40px', display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: '9px', border: 'none', cursor: enabled ? 'pointer' : 'default', background: enabled ? '#6a76ee' : '#e7e7ec', color: enabled ? '#fff' : '#bcbcc6', transition: 'all .15s ease' });\n\n    const consentStyle = { display: 'flex', alignItems: 'flex-start', gap: '14px', width: '100%', padding: '20px', borderRadius: '14px', cursor: 'pointer', fontFamily: 'inherit', border: answers.consent ? '1.5px solid #6a76ee' : '1.5px solid #dcdce3', background: answers.consent ? '#f1f0fe' : '#fff', transition: 'all .15s ease' };\n    const consentBoxStyle = { flexShrink: 0, width: '24px', height: '24px', marginTop: '1px', borderRadius: '7px', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: answers.consent ? 'none' : '1.5px solid #c7c7d2', background: answers.consent ? '#6a76ee' : 'transparent' };\n\n    return {\n      showScarcity, askItems, isCall, checkBlurb,\n      callBtn: isCall ? tActive : tIdle,\n      diaryBtn: !isCall ? tActive : tIdle,\n      setCall: () => this.setState({ checkMode: 'call' }),\n      setDiary: () => this.setState({ checkMode: 'diary' }),\n\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n\n      step, answers, error, stateFilter,\n      is0: step === 0, is1: step === 1, is2: step === 2, is3: step === 3, is4: step === 4, is5: step === 5, is6: step === 6,\n      barStyle: { width: (((step + 1) / this.total) * 100) + '%', height: '100%', background: 'linear-gradient(105deg,#8e86f0,#6a76ee)', transition: 'width .35s ease' },\n\n      onStudentName: (e) => this.set('studentName', e.target.value),\n      onParentName: (e) => this.set('parentName', e.target.value),\n      onEmail: (e) => this.set('email', e.target.value),\n      onChallenge: (e) => this.set('challenge', e.target.value),\n      onStateFilter: (e) => this.setState({ stateFilter: e.target.value, error: '' }),\n      toggleConsent: () => this.setState(s => ({ answers: { ...s.answers, consent: !s.answers.consent }, error: '' })),\n\n      gradeOptions, stateOptions,\n      next: () => this.next(),\n      back: () => this.back(),\n      backStyle: navBtn(step > 0),\n      fwdStyle: navBtn(true),\n      consentStyle, consentBoxStyle\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
